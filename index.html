<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Terminal - Buy/Sell</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; max-width: 950px; margin: auto; }
        .price-text { font-size: 26px; font-weight: bold; color: #238636; margin: 5px 0; }
        .legend { font-size: 12px; color: #8b949e; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🚀 AI Buy/Sell Terminal</h1>
    <p class="legend">🟢 Buy Arrow | 🔴 Sell Arrow | 🔵 20 EMA Line</p>

    <div class="card">
        <h2>NIFTY 50</h2>
        <div id="nifty-price" class="price-text">Loading...</div>
        <div id="chart-nifty"></div>
    </div>

    <script>
        const API_KEY = '116ae9781b96425181ecce7d513022bc';

        function calculateEMA(data, period) {
            let k = 2 / (period + 1);
            let emaArray = [];
            let ema = data[0];
            for (let i = 0; i < data.length; i++) {
                ema = (data[i] * k) + (ema * (1 - k));
                emaArray.push(parseFloat(ema.toFixed(2)));
            }
            return emaArray;
        }

        async function fetchAndDraw(chartId, priceId, apiSymbol) {
            try {
                // Fetch RSI and Candles
                const res = await fetch(`https://api.twelvedata.com/time_series?symbol=${apiSymbol}&interval=5min&outputsize=80&apikey=${API_KEY}`);
                const rsiRes = await fetch(`https://api.twelvedata.com/rsi?symbol=${apiSymbol}&interval=5min&outputsize=80&apikey=${API_KEY}`);
                
                const data = await res.json();
                const rsiData = await rsiRes.json();

                if (data.values && rsiData.values) {
                    const rawData = data.values.reverse();
                    const rsis = rsiData.values.reverse();
                    
                    const candleSeries = rawData.map(v => ({
                        x: new Date(v.datetime),
                        y: [parseFloat(v.open), parseFloat(v.high), parseFloat(v.low), parseFloat(v.close)]
                    }));

                    const closePrices = rawData.map(v => parseFloat(v.close));
                    const ema20 = calculateEMA(closePrices, 20);

                    // Markers Logic
                    let markers = [];
                    for(let i = 1; i < rawData.length; i++) {
                        let price = parseFloat(rawData[i].close);
                        let rsi = parseFloat(rsis[i].rsi);

                        if(price > ema20[i] && rsi > 60) {
                            markers.push({
                                x: new Date(rawData[i].datetime).getTime(),
                                y: parseFloat(rawData[i].low),
                                markerSize: 6,
                                fillColor: '#238636',
                                strokeColor: '#fff',
                                label: { text: 'BUY', style: { background: '#238636', color: '#fff' } }
                            });
                        } else if(price < ema20[i] && rsi < 40) {
                            markers.push({
                                x: new Date(rawData[i].datetime).getTime(),
                                y: parseFloat(rawData[i].high),
                                markerSize: 6,
                                fillColor: '#da3633',
                                strokeColor: '#fff',
                                label: { text: 'SELL', style: { background: '#da3633', color: '#fff' } }
                            });
                        }
                    }

                    document.getElementById(priceId).innerText = "₹ " + closePrices[closePrices.length-1].toLocaleString('en-IN');

                    const options = {
                        series: [
                            { name: 'Candles', type: 'candlestick', data: candleSeries },
                            { name: '20 EMA', type: 'line', data: rawData.map((v, i) => ({ x: new Date(v.datetime), y: ema20[i] })) }
                        ],
                        chart: { height: 450, type: 'line', background: 'transparent', toolbar: { show: false } },
                        stroke: { width: [1, 2], colors: ['#ff4560', '#58a6ff'] },
                        annotations: { points: markers },
                        xaxis: { type: 'datetime' },
                        theme: { mode: 'dark' },
                        plotOptions: { candlestick: { colors: { upward: '#238636', downward: '#da3633' } } }
                    };

                    new ApexCharts(document.querySelector("#" + chartId), options).render();
                }
            } catch (e) { console.log(e); }
        }

        fetchAndDraw("chart-nifty", "nifty-price", "NI50");
    </script>
</body>
</html>
