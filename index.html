<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Market Dashboard</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .chart-container { height: 450px; margin-bottom: 30px; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; background: #161b22; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        h2 { text-align: left; font-size: 16px; margin: 10px; color: #8b949e; }
    </style>
</head>
<body>

    <h1>🚀 AI Auto Signal Terminal</h1>

    <h2>NIFTY 50 (5m + 20 EMA + RSI)</h2>
    <div class="chart-container" id="chart_nifty"></div>

    <h2>SENSEX (5m + 20 EMA + RSI)</h2>
    <div class="chart-container" id="chart_sensex"></div>

    <h2>BANK NIFTY (5m + 20 EMA + RSI)</h2>
    <div class="chart-container" id="chart_bank"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <script type="text/javascript">
        function createWidget(container, symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "5",
                "timezone": "Asia/Kolkata",
                "theme": "dark",
                "style": "1",
                "locale": "in",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "save_image": false,
                "container_id": container,
                "studies": [
                    { "id": "MASimple@tv-basicstudies", "inputs": { "length": 20 } },
                    { "id": "RSI@tv-basicstudies", "inputs": { "length": 14 } }
                ]
            });
        }

        // Ye symbols bilkul sahi hain, inme Apple nahi dikhega
        createWidget("chart_nifty", "NSE:NIFTY");
        createWidget("chart_sensex", "BSE:SENSEX");
        createWidget("chart_bank", "NSE:BANKNIFTY");
    </script>

</body>
</html>
