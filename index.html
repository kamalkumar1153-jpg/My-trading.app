<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Market Terminal - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        .card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .price { font-size: 28px; font-weight: bold; color: #238636; margin: 5px 0; }
        .label { color: #8b949e; font-size: 14px; text-transform: uppercase; }
        canvas { margin-top: 10px; max-height: 200px; }
    </style>
</head>
<body>

    <h1>🚀 Market AI Terminal</h1>
    
    <div class="grid">
        <div class="card">
            <div class="label">Nifty 50</div>
            <div id="niftyPrice" class="price">Loading...</div>
            <canvas id="niftyChart"></canvas>
        </div>

        <div class="card">
            <div class="label">Sensex</div>
            <div id="sensexPrice" class="price">Loading...</div>
            <canvas id="sensexChart"></canvas>
        </div>

        <div class="card">
            <div class="label">Bank Nifty</div>
            <div id="bankPrice" class="price">Loading...</div>
            <canvas id="bankChart"></canvas>
        </div>
    </div>

    <script>
        const API_KEY = '116ae9781b96425181ecce7d513022bc';

        async function getData(symbol, priceId, chartId) {
            try {
                // Price Fetch
                const pRes = await fetch(`https://api.twelvedata.com/price?symbol=${symbol}&apikey=${API_KEY}`);
                const pData = await pRes.json();
                
                if(pData.price) {
                    document.getElementById(priceId).innerText = "₹ " + parseFloat(pData.price).toLocaleString('en-IN');
                } else {
                    document.getElementById(priceId).innerText = "Closed/Error";
                }

                // Chart Data Fetch
                const cRes = await fetch(`https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1h&outputsize=12&apikey=${API_KEY}`);
                const cData = await cRes.json();

                if(cData.values) {
                    const prices = cData.values.map(v => parseFloat(v.close)).reverse();
                    const labels = cData.values.map(v => v.datetime.split(' ')[1].substring(0,5)).reverse();
                    drawChart(chartId, labels, prices);
                }
            } catch (e) { console.error(e); }
        }

        function drawChart(id, labels, data) {
            const ctx = document.getElementById(id).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: '#58a6ff',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { grid: { color: '#30363d' } } }
                }
            });
        }

        // Twelve Data ke liye correct symbols
        function refreshAll() {
            getData('NIFTY', 'niftyPrice', 'niftyChart');
            getData('SENSEX', 'sensexPrice', 'sensexChart');
            getData('BANKNIFTY', 'bankPrice', 'bankChart');
        }

        refreshAll();
        // Har 2 minute mein update (API limit bachane ke liye)
        setInterval(refreshAll, 120000);
    </script>
</body>
</html>
