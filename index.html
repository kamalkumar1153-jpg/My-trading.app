<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal Trading Terminal</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 15px; background: #161b22; color: #f0b90b; font-size: 20px; font-weight: bold; border-bottom: 1px solid #30363d; }
        .btn-group { margin: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { background: #238636; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        button.sensex { background: #1f6feb; }
        button.btc { background: #f0b90b; color: black; }
        #chart_area { height: 75vh; width: 98%; margin: auto; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

    <div class="header">💹 Kamal Market Terminal</div>

    <div class="btn-group">
        <button onclick="change('NSE:NIFTY')">🇮🇳 Nifty 50</button>
        <button class="sensex" onclick="change('BSE:SENSEX')">🇮🇳 Sensex</button>
        <button class="btc" onclick="change('BINANCE:BTCUSDT')">₿ Bitcoin</button>
    </div>

    <div id="chart_area">
        <div id="tv_chart"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        function loadChart(symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "15",
                "timezone": "Asia/Kolkata", "theme": "dark", "style": "1",
                "locale": "in", "container_id": "tv_chart"
            });
        }
        function change(s) {
            document.getElementById("tv_chart").innerHTML = "";
            loadChart(s);
        }
        window.onload = function() { loadChart("NSE:NIFTY"); };
    </script>
</body>
</html>
