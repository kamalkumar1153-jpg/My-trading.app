<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chart Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin: 10px auto; max-width: 900px; }
        .price { font-size: 32px; font-weight: bold; color: #238636; margin-bottom: 10px; }
        .btn { background: #21262d; color: #58a6ff; border: 1px solid #30363d; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 15px 0; }
        #chart-nifty { min-height: 450px; width: 100%; margin-top: 10px; }
        .status { font-size: 13px; color: #8b949e; }
    </style>
</head>
<body>

    <h1>🚀 Market AI Terminal</h1>
    <button class="btn" onclick="loadChartData()">📊 Load / Refresh Chart</button>
    <div id="status-msg" class="status">System Ready. Click Load.</div>

    <div class="card">
        <h3>NIFTY 50 (NSE)</h3>
        <div id="nifty-val" class="price">₹ 0.00</div>
        <div id="chart-nifty"></div>
    </div>

    <script>
        const API_KEY = 'X9RBP7WIUXD6XO3C';

        async function loadChartData() {
            const status = document.getElementById('status-msg');
            status.innerText = "🔄 Connecting to Alpha Vantage...";
            
            try {
                // Nifty data fetch logic
                const url = `https://www.alphavantage.co/query?function=TIME_SERIES_INTRADAY&symbol=NSE:NIFTY&interval=5min&apikey=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data["Note"]) {
                    status.innerText = "⚠️ API Limit Reached! Wait 60 seconds.";
                    return;
                }

                const series = data["Time Series (5min)"];
                if (series) {
                    const keys = Object.keys(series).reverse();
                    const candleData = keys.map(time => ({
                        x: new Date(time),
                        y: [
                            parseFloat(series[time]["1. open"]),
                            parseFloat(series[time]["2. high"]),
                            parseFloat(series[time]["3. low"]),
                            parseFloat(series[time]["4. close"])
                        ]
                    }));

                    const currentPrice = candleData[candleData.length - 1].y[3];
                    document.getElementById('nifty-val').innerText = "₹ " + currentPrice.toLocaleString('en-IN');
                    
                    renderChart(candleData);
                    status.innerText = "✅ Chart Updated at " + new Date().toLocaleTimeString();
                } else {
                    status.innerText = "❌ No Data Found. Market might be closed.";
                }
            } catch (err) {
                status.innerText = "📡 Network Error. Try again.";
            }
        }

        function renderChart(candles) {
            const options = {
                series: [{ name: 'Price', data: candles }],
                chart: { type: 'candlestick', height: 400, background: 'transparent', toolbar: { show: false } },
                xaxis: { type: 'datetime', labels: { style: { colors: '#8b949e' } } },
                yaxis: { labels: { style: { colors: '#8b949e' } } },
                theme: { mode: 'dark' },
                plotOptions: { candlestick: { colors: { upward: '#238636', downward: '#da3633' } } }
            };

            const chartArea = document.querySelector("#chart-nifty");
            chartArea.innerHTML = ""; // Clear old chart
            new ApexCharts(chartArea, options).render();
        }
    </script>
</body>
</html>
