<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Market Terminal Fixed</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        .card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px;}
        
        .calc-box { background: #0d1117; padding: 15px; border-radius: 10px; margin: 20px auto; max-width: 400px; border: 1px dashed #58a6ff; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #30363d; width: 80%; background: #161b22; color: white; }
        .res { font-weight: bold; margin: 8px; font-size: 15px; }

        /* Chart Frame */
        iframe { width: 100%; height: 450px; border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>🚀 AI Auto Signal Terminal</h1>
    <p style="color: #8b949e;">Fixed: Multi-Chart Working Mode</p>

    <div class="calc-box">
        <h3>🧮 Trade Calculator</h3>
        <input type="number" id="entryPrice" placeholder="Apni Entry Price daalein..." oninput="calculateTrade()">
        <p class="res" style="color:#238636;">🎯 Target (1%): <span id="targetVal">0</span></p>
        <p class="res" style="color:#da3633;">🛑 Stop Loss (0.5%): <span id="slVal">0</span></p>
    </div>

    <div class="grid">
        <div class="card">
            <h2 style="text-align:left;">NIFTY 50</h2>
            <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_nifty&symbol=NIFTY&interval=5&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=MASimple%40tv-basicstudies%1fRSI%40tv-basicstudies&theme=dark&style=1&timezone=Asia%2FKolkata&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&locale=in"></iframe>
        </div>

        <div class="card">
            <h2 style="text-align:left;">BANK NIFTY</h2>
            <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_bank&symbol=BANKNIFTY&interval=5&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=MASimple%40tv-basicstudies%1fRSI%40tv-basicstudies&theme=dark&style=1&timezone=Asia%2FKolkata&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&locale=in"></iframe>
        </div>
    </div>

    <script>
        function calculateTrade() {
            const price = parseFloat(document.getElementById('entryPrice').value);
            if(price > 0) {
                document.getElementById('targetVal').innerText = (price * 1.01).toFixed(2);
                document.getElementById('slVal').innerText = (price * 0.995).toFixed(2);
            }
        }
    </script>
</body>
            </html>
