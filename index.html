<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal AI Intraday Terminal</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --gold: #f0b90b; --green: #0ecb81; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { padding: 15px; background: var(--card); color: var(--gold); font-size: 20px; font-weight: bold; border-bottom: 1px solid #30363d; }
        .btn-group { margin: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { background: #21262d; color: white; border: 1px solid #30363d; padding: 12px 18px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        button:hover { background: var(--gold); color: black; }
        #tv_chart_container { height: 550px; width: 96%; margin: auto; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; background: #131722; }
    </style>
</head>
<body>

    <div class="header">🚀 KAMAL AI INTRADAY TERMINAL</div>

    <div class="btn-group">
        <button onclick="change('NSE:IN1!')">🇮🇳 GIFT Nifty</button>
        <button onclick="change('BSE:SENSEX')">🇮🇳 Sensex</button>
        <button onclick="change('NSE:RELIANCE')">🇮🇳 Reliance</button>
    </div>

    <div id="tv_chart_container"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        function loadChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "5", // 5 मिनट इंट्राडे के लिए
                "timezone": "Asia/Kolkata",
                "theme": "dark",
                "style": "1",
                "locale": "in",
                "container_id": "tv_chart_container",
                "allow_symbol_change": true,
                "hide_side_toolbar": false
            });
        }
        function change(s) {
            document.getElementById("tv_chart_container").innerHTML = "";
            loadChart(s);
        }
        // शुरुआत में GIFT Nifty लोड होगा
        window.onload = function() { loadChart("NSE:IN1!"); };
    </script>
</body>
</html>
