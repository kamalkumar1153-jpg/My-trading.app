<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Market Terminal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; text-align: center; }
        .chart-container { height: 500px; width: 100%; margin-top: 20px; }
        h1 { color: #00ff88; }
        .stats { display: flex; justify-content: space-around; background: #1e1e1e; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nifty 50 Live Terminal</h1>
        
        <div class="stats">
            <div>Symbol: <strong>NIFTY 50</strong></div>
            <div>Interval: <strong>5 Min</strong></div>
            <div id="price-display">Market: <span style="color: #00ff88;">Live</span></div>
        </div>

        <div class="chart-container">
            <div id="tradingview_chart"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "NSE:NIFTY",
            "interval": "5",
            "timezone": "Asia/Kolkata",
            "theme": "dark",
            "style": "1",
            "locale": "in",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "save_image": false,
            "container_id": "tradingview_chart"
        });
    </script>

</body>
</html>
