<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Market Terminal Max</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        .card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; position: relative; margin-bottom: 20px;}
        
        /* Stats Style */
        .stats { display: flex; justify-content: space-around; margin-top: 10px; font-size: 13px; font-weight: bold; }
        .high { color: #238636; }
        .low { color: #da3633; }

        /* Calculator Style */
        .calc-box { background: #0d1117; padding: 15px; border-radius: 10px; margin: 20px auto; max-width: 400px; border: 1px dashed #58a6ff; }
        input { padding: 10px; border-radius: 5px; border: none; width: 80%; margin: 10px 0; background: #161b22; color: white; border: 1px solid #30363d; }
        .res { font-weight: bold; margin: 5px; font-size: 15px; }

        .signal-badge { position: absolute; top: 10px; right: 10px; padding: 6px 12px; border-radius: 5px; font-weight: bold; }
        .buy { background: #238636; box-shadow: 0 0 10px #238636; }
        .sell { background: #da3633; box-shadow: 0 0 10px #da3633; }
        .neutral { background: #8b949e; }
        .chart-container { height: 400px; margin-top: 15px; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

    <h1>🚀 AI Auto Signal Terminal Max</h1>
    <p id="status" style="color: #8b949e; cursor: pointer;">Click here to enable Sound Alerts 🔔</p>

    <div class="calc-box">
        <h3>🧮 Trade Calculator</h3>
        <input type="number" id="entryPrice" placeholder="Apni Entry Price daalein..." oninput="calculateTrade()">
        <div id="calc-results">
            <p class="res" style="color:#238636;">🎯 Target (1%): <span id="targetVal">0</span></p>
            <p class="res" style="color:#da3633;">🛑 Stop Loss (0.5%): <span id="slVal">0</span></p>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div id="nifty-signal" class="signal-badge neutral">WAITING...</div>
            <h2 style="text-align:left;">NIFTY 50</h2>
            <div class="stats">
                <span class="high">H: <span id="nifty-high">0</span></span>
                <span class="low">L: <span id="nifty-low">0</span></span>
            </div>
            <div class="chart-container" id="nifty_chart"></div>
        </div>

        <div class="card">
            <div id="bank-signal" class="signal-badge neutral">WAITING...</div>
            <h2 style="text-align:left;">BANK NIFTY</h2>
            <div class="stats">
                <span class="high">H: <span id="bank-high">0</span></span>
                <span class="low">L: <span id="bank-low">0</span></span>
            </div>
            <div class="chart-container" id="bank_chart"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const API_KEY = '116ae9781b96425181ecce7d513022bc';
        let audioEnabled = false;

        function calculateTrade() {
            const price = parseFloat(document.getElementById('entryPrice').value);
            if(price > 0) {
                document.getElementById('targetVal').innerText = (price * 1.01).toFixed(2);
                document.getElementById('slVal').innerText = (price * 0.995).toFixed(2);
            }
        }

        document.getElementById('status').addEventListener('click', () => {
            audioEnabled = true;
            document.getElementById('status').innerText = "✅ Sound Active";
        });

        function playAlert(freq) {
            if(!audioEnabled) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        }

        function loadChart(container, symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "5", "theme": "dark", "container_id": container,
                "studies": [{ "id": "MASimple@tv-basicstudies", "inputs": { "length": 20 } }, { "id": "RSI@tv-basicstudies", "inputs": { "length": 14 } }]
            });
        }

        async function updateData(symbol, badgeId, highId, lowId) {
            try {
                // Fetch RSI and Quote Data
                const rsiRes = await fetch(`https://api.twelvedata.com/rsi?symbol=${symbol}&interval=5min&apikey=${API_KEY}`);
                const quoteRes = await fetch(`https://api.twelvedata.com/quote?symbol=${symbol}&apikey=${API_KEY}`);
                
                const rsiData = await rsiRes.json();
                const quoteData = await quoteRes.json();

                if (quoteData.high) {
                    document.getElementById(highId).innerText = parseFloat(quoteData.high).toFixed(0);
                    document.getElementById(lowId).innerText = parseFloat(quoteData.low).toFixed(0);
                }

                if (rsiData.values) {
                    const rsi = parseFloat(rsiData.values[0].rsi);
                    const badge = document.getElementById(badgeId);
                    if (rsi > 60) {
                        badge.innerText = "🚀 BUY"; badge.className = "signal-badge buy"; playAlert(880);
                    } else if (rsi < 40) {
                        badge.innerText = "🔻 SELL"; badge.className = "signal-badge sell"; playAlert(440);
                    } else {
                        badge.innerText = "⏳ WAIT"; badge.className = "signal-badge neutral";
                    }
                }
            } catch (e) { console.log("Limit hit"); }
        }

        loadChart("nifty_chart", "NSE:NIFTY");
        loadChart("bank_chart", "NSE:BANKNIFTY");

        setInterval(() => {
            updateData("NI50", "nifty-signal", "nifty-high", "nifty-low");
            updateData("CNXBANK", "bank-signal", "bank-high", "bank-low");
        }, 120000);
    </script>
</body>
    </html>
