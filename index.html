<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal AI Pro Intraday Terminal</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --gold: #f0b90b; --green: #0ecb81; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { padding: 15px; background: var(--card); color: var(--gold); font-size: 22px; font-weight: bold; border-bottom: 1px solid #30363d; }
        .btn-group { margin: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { background: #21262d; color: white; border: 1px solid #30363d; padding: 12px 18px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        button:hover { background: var(--gold); color: black; }
        .chart-frame { width: 98%; height: 600px; margin: auto; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">🚀 KAMAL AI INTRADAY TERMINAL</div>

    <div class="btn-group">
        <button onclick="loadChart('nifty-50')">🇮🇳 Nifty 50</button>
        <button onclick="loadChart('s-p-bse-sensex')">🇮🇳 Sensex</button>
        <button onclick="loadChart('reliance-industries')">🇮🇳 Reliance</button>
    </div>

    <div class="chart-frame" id="chart_container">
        <iframe id="trading_frame" src="https://it.investing.com/charts/live-charts?pair_id=179&theme=dark"></iframe>
    </div>

    <script>
        function loadChart(type) {
            let frame = document.getElementById('trading_frame');
            if(type === 'nifty-50') {
                frame.src = "https://it.investing.com/charts/live-charts?pair_id=179&theme=dark";
            } else if(type === 's-p-bse-sensex') {
                frame.src = "https://it.investing.com/charts/live-charts?pair_id=166&theme=dark";
            } else if(type === 'reliance-industries') {
                frame.src = "https://it.investing.com/charts/live-charts?pair_id=18417&theme=dark";
            }
        }
    </script>

</body>
</html>
