<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market AI Chart Pro</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin: 10px auto; max-width: 900px; }
        #chart-container { height: 400px; width: 100%; margin-top: 15px; }
        .price { font-size: 32px; font-weight: bold; color: #238636; margin: 10px 0; }
        .btn { background: #21262d; color: #58a6ff; border: 1px solid #30363d; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .status { font-size: 12px; color: #8b949e; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>🚀 Market AI Terminal</h1>
    <div class="status" id="api-msg">Ready to Load Data</div>
    <button class="btn" onclick="fetchStockData()">📊 Load Nifty Chart</button>

    <div class="card">
        <h3>NIFTY 50 (5 Min Chart)</h3>
        <div id="nifty-price" class="price">₹ --</div>
        <div id="chart-container"></div>
    </div>

    <script>
        const API_KEY = 'X9RBP7WIUXD6XO3C';
        let chart, candlestickSeries;

        // Initialize Chart
        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 400,
                layout: { backgroundColor: '#161b22', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#30363d' }, horzLines: { color: '#30363d' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                priceScale: { borderColor: '#30363d' },
                timeScale: { borderColor: '#30363d', timeVisible: true, secondsVisible: false }
            });
            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350'
            });
        }

        async function fetchStockData() {
            const msg = document.getElementById('api-msg');
            msg.innerText = "Connecting to API...";
            
            try {
                const url = `https://www.alphavantage.co/query?function=TIME_SERIES_INTRADAY&symbol=NSE:NIFTY&interval=5min&apikey=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data["Note"]) {
                    msg.innerText = "❌ API Limit Reached! Wait 1 minute.";
                    return;
                }

                const timeSeries = data["Time Series (5min)"];
                if (timeSeries) {
                    const formattedData = Object.keys(timeSeries).map(time => ({
                        time: new Date(time).getTime() / 1000,
                        open: parseFloat(timeSeries[time]["1. open"]),
                        high: parseFloat(timeSeries[time]["2. high"]),
                        low: parseFloat(timeSeries[time]["3. low"]),
                        close: parseFloat(timeSeries[time]["4. close"])
                    })).sort((a, b) => a.time - b.time);

                    if (!chart) initChart();
                    candlestickSeries.setData(formattedData);
                    document.getElementById('nifty-price').innerText = "₹ " + formattedData[formattedData.length-1].close.toLocaleString('en-IN');
                    msg.innerText = "✅ Chart Updated: " + new Date().toLocaleTimeString();
                } else {
                    msg.innerText = "⚠️ Market Data Not Found (Check Symbol)";
                }
            } catch (e) {
                msg.innerText = "📡 Network Error. Check Internet.";
            }
        }

        // Handle resizing
        window.addEventListener('resize', () => {
            if (chart) chart.resize(document.getElementById('chart-container').clientWidth, 400);
        });
    </script>
</body>
</html>
