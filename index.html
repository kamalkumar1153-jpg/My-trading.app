<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Terminal</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: #1e222d; padding: 20px; border-radius: 15px; }
        .menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 15px; border-radius: 8px; border: none; background: #2962ff; color: white; cursor: pointer; font-weight: bold; }
        #chart_container { height: 500px; width: 100%; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💹 Market Terminal</h2>
        <div class="menu">
            <button onclick="changeSymbol('NIFTY')">🇮🇳 Nifty 50</button>
            <button onclick="changeSymbol('SENSEX')">🇮🇳 Sensex</button>
            <button onclick="changeSymbol('BTCUSDT')">₿ Bitcoin</button>
            <button onclick="changeSymbol('AAPL')">🍎 Apple</button>
            <button onclick="changeSymbol('SPX')">🇺🇸 S&P 500</button>
        </div>
        <div id="chart_container"></div>
    </div>

    <script>
        function loadChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Asia/Kolkata",
                "theme": "dark",
                "style": "1",
                "locale": "in",
                "container_id": "chart_container",
                "hide_side_toolbar": false,
                "allow_symbol_change": true
            });
        }

        function changeSymbol(s) {
            loadChart(s);
        }

        window.onload = () => loadChart('NIFTY');
    </script>
</body>
</html>
