<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Market Dashboard</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .chart-box { height: 450px; margin-bottom: 25px; border: 1px solid #30363d; border-radius: 8px; }
        h2 { color: #58a6ff; text-align: left; padding-left: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <h1>🚀 AI Auto Signal Terminal</h1>

    <h2>NIFTY 50 (5 min + 20 EMA + RSI)</h2>
    <div class="chart-box" id="nifty"></div>

    <h2>SENSEX (5 min + 20 EMA + RSI)</h2>
    <div class="chart-box" id="sensex"></div>

    <h2>BANK NIFTY (5 min + 20 EMA + RSI)</h2>
    <div class="chart-box" id="banknifty"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        function createChart(container, symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "5",
                "timezone": "Asia/Kolkata",
                "theme": "dark",
                "style": "1",
                "locale": "in",
                "container_id": container,
                "studies": [
                    { "id": "MASimple@tv-basicstudies", "inputs": { "length": 20 } },
                    { "id": "RSI@tv-basicstudies", "inputs": { "length": 14 } }
                ]
            });
        }

        // Charts Load Karein
        createChart("nifty", "NSE:NIFTY");
        createChart("sensex", "BSE:SENSEX");
        createChart("banknifty", "NSE:BANKNIFTY");
    </script>
</body>
</html>
